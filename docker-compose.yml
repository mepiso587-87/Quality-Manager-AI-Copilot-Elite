version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: qm-postgres
    environment:
      POSTGRES_USER: qm_user
      POSTGRES_PASSWORD: qm_password
      POSTGRES_DB: qm_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - qm_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qm_user -d qm_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: qm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - qm_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.3
    container_name: qm-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - qm_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  
volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  

networks:
  qm_network:
    driver: bridge
